<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      integrity="sha512-9usAa10IRO0HhonpyAIVpjrylPvoDwiPUiKdWk5t3PyolY1cOd4DSE0Ga+ri4AuTroPR5aQvXU9xC6qOPnzFeg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="shortcut icon" href="favlogo.png" type="image/x-icon" />
    <title>Best browser-based Notepad</title>
  </head>
  <body>
    <!-- ! Top bar -->

    <div class="top_bar">
      <!-- right side Start-->

      <div class="right_side">
        <div class="logo">
          <img src="favlogo.png" alt="Logo" />
          <h3>NeoPad</h3>
        </div>
        <div class="drop_down">
          <button class="drop_btn">File</button>
          <div class="drop_menu">
            <a href="">bilal</a>
            <a href="">bilal</a>
            <a href="">bilal</a>
          </div>
        </div>
        <div class="drop_down">
          <button class="drop_btn">Edit</button>
          <div class="drop_menu">
            <a href="">bilal</a>
            <a href="">bilal</a>
            <a href="">bilal</a>
          </div>
        </div>
        <div class="drop_down">
          <button class="drop_btn">View</button>
          <div class="drop_menu">
            <a href="">bilal</a>
            <a href="">bilal</a>
            <a href="">bilal</a>
          </div>
        </div>
        <div class="drop_down">
          <button class="drop_btn">help</button>
          <div class="drop_menu">
            <a href="">bilal</a>
            <a href="">bilal</a>
            <a href="">bilal</a>
          </div>
        </div>
      </div>
      <!-- left side Start-->

      <div class="left_side">
        <div class="search_icon">
          <i class="fa-solid fa-magnifying-glass icon"></i>
        </div>
        <div class="theme_icon">
          <i class="fa-solid fa-moon icon"></i>
        </div>
        <div class="setting_icon">
          <i class="fa-solid fa-gear icon"></i>
        </div>
        <div class="fullscreen_icon">
          <i class="fa-solid fa-expand icon"></i>
        </div>
        <button><i class="fa-solid fa-arrow-up-from-bracket"></i> Share</button>
      </div>
    </div>
    <!-- ! Top bar End-->
    <script src="app.js"></script>
  </body>
</html>
